# Shared CardDAV defaults (inherited by all accounts, can be overridden per account)
carddav:
  # ca_cert: /path/to/ca-bundle.crt
  # client_cert: /path/to/client.crt
  # client_key: /path/to/client.key
  # verify_ssl: true
  # refresh_interval: 300
  # realtime: false
  # http3: false
  # forward_requester: true

ldap:
  host: 0.0.0.0
  # port: auto-detected (389 for LDAP, 636 for LDAPS) — override to set explicitly
  base_dn: ou=Contacts,dc=carddav2ldap,dc=mwllgr,dc=at

  # Optional: enable LDAPS (TLS)
  # tls_cert: /path/to/server.crt
  # tls_key: /path/to/server.key

  # Optional: CA for verifying client certificates (mTLS)
  # tls_ca: /path/to/ca.crt
  # require_client_cert: false

  # Optional: whitelist of allowed client certificate CNs
  # allowed_client_cns:
  #   - phone1.example.com
  #   - phone2.example.com

# At least one account is required.
# Each account maps an LDAP bind DN to a CardDAV phonebook.
accounts:
  - bind_dn: cn=phone1,ou=Users,dc=carddav2ldap,dc=mwllgr,dc=at
    bind_password: secret1
    carddav:
      url: https://dav.example.com/addressbooks/user1/contacts/
      username: user1
      password: dav-password1
  # - bind_dn: cn=phone2,ou=Users,dc=carddav2ldap,dc=mwllgr,dc=at
  #   bind_password: secret2
  #   carddav:
  #     url: https://dav.example.com/addressbooks/user2/contacts/
  #     username: user2
  #     password: dav-password2
  #     realtime: true  # per-account override

# Map LDAP attributes to vCard properties.
# Each LDAP attribute maps to a list of vCard property paths.
# Paths use dot notation: "tel.cell" = TEL with TYPE=CELL.
attribute_mapping:
  cn: [fn]
  sn: [n.family]
  givenName: [n.given]
  mail: [email]
  telephoneNumber: [tel]
  mobile: [tel.cell]
  homePhone: [tel.home]
  workPhone: [tel.work]
  facsimileTelephoneNumber: [tel.fax]
  pager: [tel.pager]
  title: [title]
  o: [org]
  street: [adr.street]
  l: [adr.city]
  st: [adr.region]
  postalCode: [adr.code]
  c: [adr.country]
