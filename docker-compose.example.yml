services:
  carddav-to-ldap:
    build: .
    ports:
      - "389:389"
      # - "636:636"  # Use this instead for LDAPS
    # volumes:
    #   - ./config.yaml:/app/config.yaml:ro
    #   - ./certs:/certs:ro
    # command: ["/app/config.yaml"]
    environment:
      # Container user
      # C2L_PUID: "1006"

      # Account 1 (at least one account required)
      C2L_ACCOUNT_1_BIND_DN: cn=phone,ou=Users,dc=carddav2ldap,dc=mwllgr,dc=at
      C2L_ACCOUNT_1_BIND_PASSWORD: secret
      C2L_ACCOUNT_1_CARDDAV_URL: https://dav.example.com/addressbooks/user/contacts/
      C2L_ACCOUNT_1_CARDDAV_USERNAME: user@example.com
      C2L_ACCOUNT_1_CARDDAV_PASSWORD: secret

      # Account 2
      # C2L_ACCOUNT_2_BIND_DN: cn=phone2,ou=Users,dc=carddav2ldap,dc=mwllgr,dc=at
      # C2L_ACCOUNT_2_BIND_PASSWORD: pass2
      # C2L_ACCOUNT_2_CARDDAV_URL: https://dav.example.com/addressbooks/user2/contacts/
      # C2L_ACCOUNT_2_CARDDAV_USERNAME: user2
      # C2L_ACCOUNT_2_CARDDAV_PASSWORD: secret2

      # CardDAV shared defaults (inherited by all accounts)
      # C2L_CARDDAV_CA_CERT: /certs/ca.crt
      # C2L_CARDDAV_CLIENT_CERT: /certs/client.crt
      # C2L_CARDDAV_CLIENT_KEY: /certs/client.key
      # C2L_CARDDAV_VERIFY_SSL: "true"
      # C2L_CARDDAV_REFRESH_INTERVAL: "300"
      # C2L_CARDDAV_REALTIME: "false"
      # C2L_CARDDAV_HTTP3: "false"
      # C2L_CARDDAV_FORWARD_REQUESTER: "true"

      # LDAP server
      # C2L_LDAP_HOST: 0.0.0.0
      # C2L_LDAP_PORT: "0"  # Auto: 389 for LDAP, 636 for LDAPS
      # C2L_LDAP_BASE_DN: ou=Contacts,dc=carddav2ldap,dc=mwllgr,dc=at

      # LDAPS / TLS
      # C2L_LDAP_TLS_CERT: /certs/server.crt
      # C2L_LDAP_TLS_KEY: /certs/server.key

      # mTLS (LDAP client certificates)
      # C2L_LDAP_TLS_CA: /certs/ca.crt
      # C2L_LDAP_REQUIRE_CLIENT_CERT: "false"
      # C2L_LDAP_ALLOWED_CLIENT_CNS: phone1.example.com,phone2.example.com
    restart: unless-stopped
