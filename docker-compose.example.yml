services:
  carddav-to-ldap:
    build: .
    ports:
      - "389:389"
    environment:
      CARDDAV_URL: https://dav.example.com/addressbooks/user/contacts/
      CARDDAV_USERNAME: user@example.com
      CARDDAV_PASSWORD: secret
      CARDDAV_REFRESH_INTERVAL: "300"
      LDAP_BASE_DN: dc=carddav2ldap,dc=mwllgr,dc=at
    restart: unless-stopped

